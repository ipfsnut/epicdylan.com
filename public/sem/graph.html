    bloodline:'Born from χ² like CFI, but with a heavier complexity penalty. Always ≤ CFI when both are below 1.0. Both depend on the null model — if the null model RMSEA is below .158, both TLI and CFI can be misleadingly low. Report TLI or CFI, not both.',
    teach:'TLI and CFI are siblings, but TLI is the stricter one. CFI barely punishes you for adding parameters (penalty = 1). TLI punishes harder (penalty = χ²/df). If your model is overfit with unnecessary paths, TLI will catch it before CFI does.' },

  { id:'baseline-model', label:'Baseline (Null) Model', cat:'testing',
    plain:'The "worst-case" reference model that incremental fit indices (CFI, TLI) compare your model against. In CFA, it\'s the model where all variables have variances but zero correlations — "nothing is related to anything." Your model\'s CFI and TLI measure how much better you are than this floor. Different software can define it differently, which affects your fit indices.',
    formula:'CFA null: free means & variances, all covariances = 0\ndf(null) = k(k−1)/2 where k = observed variables\nAll incremental indices = (null − model) / null',
    example:'With 6 variables, the null model fixes all 15 covariances to zero. Its χ² is huge (say 800). Your model χ² is 45. CFI and TLI measure how much of that 800-point gap your model closes.',
    bloodline:'The denominator in every incremental fit index. If the null model doesn\'t fit terribly (RMSEA < .158), CFI and TLI lose their reference point and become unreliable. Connected to CFI, TLI, and the fit philosophy concept.',
    teach:'CFI and TLI are always asking: "how much better are you than assuming nothing relates to anything?" The null model IS that "nothing relates" assumption. If your variables genuinely don\'t correlate much, the null model isn\'t that bad, and your CFI/TLI will look artificially low.' },

  { id:'aic', label:'AIC (Akaike Information Criterion)', cat:'testing',
    plain:'A model comparison tool that balances fit against complexity. Lower AIC = better balance. Unlike CFI/RMSEA, AIC has no fixed cutoff — it\'s only meaningful when comparing two or more models. The key advantage: it works for NON-NESTED models, so you can compare structurally different models that χ² difference tests can\'t touch.',
    formula:'AIC = −2L + 2p\nL = log-likelihood, p = number of parameters\nPenalty per parameter: 2\nLower is better (no fixed cutoff)',
    example:'Model A (3 factors): AIC = 5420. Model B (4 factors): AIC = 5395. Model B fits better even after penalizing the extra parameters. But you can\'t say either is "good" in absolute terms — AIC is purely comparative.',
    bloodline:'Born from information theory. Connected to ML estimation (uses the log-likelihood). Sibling of BIC, which penalizes complexity more harshly. Can compare non-nested models, unlike the χ² difference test.',
    teach:'AIC answers: "which model loses the least information about the data while staying simple?" It\'s a relative scorecard, not an absolute grade. Comparing two AIC values tells you which model wins; a single AIC value tells you nothing.' },

  { id:'bic', label:'BIC (Bayesian Information Criterion)', cat:'testing',
    plain:'Like AIC but with a harsher complexity penalty that grows with sample size. BIC punishes extra parameters more, so it favors simpler models than AIC does. When AIC and BIC disagree, AIC picked the more complex model and BIC picked the simpler one — and the truth depends on whether parsimony or fit matters more for your question.',
    formula:'BIC = −2L + ln(N) × p\nL = log-likelihood, N = sample size, p = parameters\nPenalty per parameter: ln(N)\nCrossover at N = e² ≈ 7.4; above that, BIC penalizes harder than AIC.',
    example:'With N = 200, ln(200) = 5.3, so BIC charges 5.3 per parameter vs. AIC\'s 2. Model A (simpler): BIC = 5480. Model B (complex): BIC = 5510. BIC prefers A even though AIC preferred B.',
    bloodline:'Sibling of AIC with a heavier parsimony penalty. The penalty scales with N, so BIC gets increasingly strict with larger samples. Connected to ML estimation and the fit philosophy of balancing fit vs. simplicity.',
    teach:'AIC and BIC are the "good cop / bad cop" of model comparison. AIC is lenient on complexity. BIC is strict. When they agree, you can be confident. When they disagree, it tells you the answer depends on how much you value simplicity.' },

  { id:'pclose', label:'PCLOSE (Test of Close Fit)', cat:'testing',
    plain:'A p-value that tests whether your RMSEA is ≤ .05 in the population. If PCLOSE > .05, you can\'t reject that your model has "close fit." If PCLOSE < .05, your model fits worse than "close." It\'s essentially a significance test of RMSEA itself — not just "what\'s my RMSEA?" but "could my RMSEA plausibly be this small?"',
    formula:'H₀: RMSEA ≤ .05 (close fit)\nH₁: RMSEA > .05\nWant: PCLOSE > .05 (can\'t reject close fit)\nBased on non-central χ² distribution',
    example:'RMSEA = .062 but PCLOSE = .21. Even though point estimate exceeds .05, the test says you can\'t rule out close fit — the .062 could be sampling error from a population RMSEA of .05 or less.',
    bloodline:'Born from RMSEA and its confidence interval. Formalizes the "is my RMSEA meaningfully above .05?" question. Connected to power — low df and small N reduce the power of this test, making it less informative.',
    teach:'RMSEA gives you a point estimate. PCLOSE tells you whether that estimate is significantly worse than "close fit." It\'s the confidence interval logic applied to RMSEA: your observed RMSEA might just be noise around a truly close-fitting model.' },

  // ── FIT INDEX DEBATES ──
  { id:'hu-bentler', label:'Fit Cutoff Debates (Hu & Bentler)', cat:'testing',
    plain:'Hu & Bentler (1999) proposed the specific cutoffs everyone uses: CFI ≥ .95, RMSEA ≤ .06, SRMR ≤ .08. These became gospel, but they were derived from specific conditions (simple models, large samples, normal data). The debate: are these cutoffs universal or do they need to be adjusted for model complexity, sample size, and the number of variables?',
    formula:'The "golden rules":\n  CFI ≥ .95 (good), ≥ .90 (acceptable)\n  RMSEA ≤ .06 (good), ≤ .08 (acceptable)\n  SRMR ≤ .08\nBUT: these are guidelines, not laws',
    example:'Your complex model with 40 variables gets CFI = .92, RMSEA = .05. By Hu & Bentler, CFI is below .95 so it\'s "bad." But some argue that with 40 variables, .92 is actually reasonable because CFI is penalized by model complexity.',
    bloodline:'Born from the fit indices themselves (CFI, RMSEA, SRMR). Connected to model fit philosophy — the cutoffs are tools for the "close enough" question, not truth detectors. The debate matters because blindly applying cutoffs leads to bad decisions.',
    teach:'Everyone memorizes .95/.06/.08. But the original paper tested specific conditions. Your professor probably wants you to understand that these are guidelines that depend on context — not magical thresholds that separate good from bad.' },

  { id:'tracing-rules', label:'Wright\'s Tracing Rules', cat:'sem',
    plain:'The algorithm for decomposing a correlation (or covariance) between any two variables in a path diagram into the sum of all legitimate compound paths. A legitimate path: (1) can pass through at most one double-headed arrow (curved covariance arc), (2) never passes through the same variable twice, and (3) never goes "forward" then "backward" through a single-headed arrow — once you reverse direction you can\'t go forward again UNLESS you cross a double-headed arc. The value of each compound path = the product of all coefficients along it. The predicted correlation = the sum of all compound paths. This is HOW SEM builds the model-implied covariance matrix Σ(θ) — every cell in that matrix is the sum of all valid traced paths between those two variables.',
    formula:'r(X,Y) = Σ (product of coefficients along each valid compound path)\n\nRules for a valid compound path:\n1. No loops — never pass through the same variable twice\n2. At most one double-headed arrow (↔) per path\n3. Direction: can go backward along arrows, then optionally cross one ↔, then go forward\n   — NOT forward-then-backward through single-headed arrows\n4. Each compound path\'s value = product of all path coefficients along it\n5. The total = sum of all valid compound paths',
    example:'Model: X → M → Y, with X → Y also (partial mediation).\nTracing r(X,Y):\n  Path 1: X → Y (direct) = c\'\n  Path 2: X → M → Y (indirect) = a × b\n  Total: r(X,Y) = c\' + ab\nThat\'s it — two valid paths, multiply along each, sum them. The model-implied covariance matrix entry for (X,Y) is exactly c\' + ab.',
    bloodline:'Born from Sewall Wright\'s path analysis (1920s). This is the mechanical procedure that turns a path diagram into the model-implied covariance matrix. Without tracing rules, SEM is just a picture — with them, every arrow becomes an equation. Connects path coefficients, direct/indirect/total effects, and the covariance matrix into one system.',
    teach:'Tracing rules are the Rosetta Stone of SEM. You draw a diagram (theory). Tracing rules translate it into math (model-implied covariances). ML estimation then finds the coefficients that make that math match the observed covariance matrix as closely as possible. Diagram → tracing rules → Σ(θ) → compare to S → fit indices.' },
];

// ================================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H,dpr;
let panX=0,panY=0,zoom=1;
let drag=null,dragOX=0,dragOY=0;
let pan=false,panSX=0,panSY=0,panSPX=0,panSPY=0;
let hovered=null, selected=null;
let activeFilters=new Set(Object.keys(CATS));
let searchTerm='';

const nmap={};
NODES.forEach(n=>nmap[n.id]=n);

function resize(){
  dpr=window.devicePixelRatio||1;
  W=canvas.parentElement.clientWidth;
  H=canvas.parentElement.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
}

function initPositions(){
  const catKeys=Object.keys(CATS);
  const catPos={};
  const r=800;
  catKeys.forEach((c,i)=>{
    const a=(i/catKeys.length)*Math.PI*2 - Math.PI/2;
    catPos[c]={x:Math.cos(a)*r, y:Math.sin(a)*r};
  });
  const catNodes={};
  NODES.forEach(n=>{ if(!catNodes[n.cat]) catNodes[n.cat]=[]; catNodes[n.cat].push(n); });
  Object.entries(catNodes).forEach(([cat,nodes])=>{
    const cp=catPos[cat];
    nodes.forEach((n,i)=>{
      const angle=i*0.9;
      const dist=25+i*14;
      n.x=cp.x+Math.cos(angle)*dist;
      n.y=cp.y+Math.sin(angle)*dist;
      n.vx=0; n.vy=0;
    });
  });
}

function vis(){
  return NODES.filter(n=>{
    if(!activeFilters.has(n.cat)) return false;
    if(searchTerm && !n.label.toLowerCase().includes(searchTerm) && !n.plain.toLowerCase().includes(searchTerm)) return false;
    return true;
  });
}
function visE(){
  const s=new Set(vis().map(n=>n.id));
  return EDGES.filter(e=>s.has(e.from)&&s.has(e.to));
}

function sim(){
  const nodes=vis(), edges=visE(), alpha=0.28;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      let f=16000/(d*d);
      let fx=(dx/d)*f, fy=(dy/d)*f;
      a.vx-=fx*alpha; a.vy-=fy*alpha;
      b.vx+=fx*alpha; b.vy+=fy*alpha;
    }
  }
  edges.forEach(e=>{
    const a=nmap[e.from],b=nmap[e.to];
    let dx=b.x-a.x,dy=b.y-a.y;
    let d=Math.sqrt(dx*dx+dy*dy)||1;
    let f=(d-130)*0.018;
    let fx=(dx/d)*f, fy=(dy/d)*f;
    a.vx+=fx*alpha; a.vy+=fy*alpha;
    b.vx-=fx*alpha; b.vy-=fy*alpha;
  });
  nodes.forEach(n=>{
    n.vx-=n.x*0.002*alpha;
    n.vy-=n.y*0.002*alpha;
  });
  energy=0;
  nodes.forEach(n=>{
    if(n===drag) return;
    n.vx*=0.55; n.vy*=0.55;
    n.x+=n.vx; n.y+=n.vy;
    energy+=n.vx*n.vx+n.vy*n.vy;
  });
}

function w2s(x,y){ return {x:(x*zoom+panX)*dpr+W*dpr/2, y:(y*zoom+panY)*dpr+H*dpr/2}; }
function s2w(sx,sy){ return {x:(sx-W/2-panX)/zoom, y:(sy-H/2-panY)/zoom}; }

// ---- Semantic zoom ----
const CLUSTER_ZOOM=0.4;
let energy=1, animating=false;

function getClusters(){
  const map={};
  vis().forEach(n=>{
    if(!map[n.cat]) map[n.cat]={cat:n.cat,nodes:[]};
    map[n.cat].nodes.push(n);
  });
  return Object.values(map).map(c=>{
    const cx=c.nodes.reduce((s,n)=>s+n.x,0)/c.nodes.length;
    const cy=c.nodes.reduce((s,n)=>s+n.y,0)/c.nodes.length;
    return {...c, x:cx, y:cy, label:CATS[c.cat].label, count:c.nodes.length};
  });
}

function clusterEdgeCounts(clusters){
  const cSet=new Set(clusters.map(c=>c.cat));
  const counts={};
  visE().forEach(e=>{
    const ca=nmap[e.from]?.cat, cb=nmap[e.to]?.cat;
    if(ca&&cb&&ca!==cb&&cSet.has(ca)&&cSet.has(cb)){
      const key=ca<cb?ca+'|'+cb:cb+'|'+ca;
      counts[key]=(counts[key]||0)+1;
    }
  });
  const cmap={}; clusters.forEach(c=>cmap[c.cat]=c);
  return Object.entries(counts).map(([key,count])=>{
    const [a,b]=key.split('|');
    return {from:cmap[a],to:cmap[b],count};
  });
}

function animateTo(tz,tpx,tpy,dur){
  dur=dur||400;
  const sz=zoom,spx=panX,spy=panY,t0=performance.now();
  animating=true;
  function step(now){
    let t=Math.min(1,(now-t0)/dur);
    const e=t<0.5?2*t*t:-1+(4-2*t)*t;
    zoom=sz+(tz-sz)*e; panX=spx+(tpx-spx)*e; panY=spy+(tpy-spy)*e;
    if(t<1) requestAnimationFrame(step); else animating=false;
  }
  requestAnimationFrame(step);
}

function zoomToFit(nodeList,pad){
  pad=pad||80;
  const ns=nodeList||vis();
  if(!ns.length) return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  ns.forEach(n=>{ if(n.x<x0)x0=n.x; if(n.x>x1)x1=n.x; if(n.y<y0)y0=n.y; if(n.y>y1)y1=n.y; });
  const sx=(x1-x0)||1, sy=(y1-y0)||1;
  const tz=Math.max(0.15,Math.min(3,Math.min(W/(sx+pad*2),H/(sy+pad*2))));
  const tpx=-(x0+x1)/2*tz, tpy=-(y0+y1)/2*tz;
  animateTo(tz,tpx,tpy);
}

function focusOnNode(node){
  const nIds=new Set([node.id]);
  EDGES.forEach(e=>{ if(e.from===node.id)nIds.add(e.to); if(e.to===node.id)nIds.add(e.from); });
  const ns=NODES.filter(n=>nIds.has(n.id));
  selectNode(node);
  zoomToFit(ns,120);
}

function zoomToCluster(cat){
  const ns=vis().filter(n=>n.cat===cat);
  if(ns.length) zoomToFit(ns,100);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ---- Cluster mode at low zoom ----
  if(zoom<CLUSTER_ZOOM){
    const clusters=getClusters();
    const cedges=clusterEdgeCounts(clusters);
    cedges.forEach(ce=>{
      const pa=w2s(ce.from.x,ce.from.y),pb=w2s(ce.to.x,ce.to.y);
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle='rgba(100,100,130,0.25)';
      ctx.lineWidth=Math.min(1+ce.count*0.6,5)*dpr;
      ctx.stroke();
      const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;
      ctx.font=`500 ${8*dpr}px 'IBM Plex Sans'`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(160,160,180,0.45)';
      ctx.fillText(ce.count,mx,my);
    });
    clusters.forEach(c=>{
      const p=w2s(c.x,c.y);
      const cat=CATS[c.cat];
      const r=(45+c.count*2.5)*zoom*dpr;
      const g=ctx.createRadialGradient(p.x,p.y,r*0.3,p.x,p.y,r*2.5);
      g.addColorStop(0,cat.color+'25'); g.addColorStop(1,cat.color+'00');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*2.5,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle=cat.color+'14'; ctx.strokeStyle=cat.color+'55';
      ctx.lineWidth=2*dpr; ctx.fill(); ctx.stroke();
      const fs=Math.max(11,15*zoom)*dpr;
      ctx.font=`600 ${fs}px 'IBM Plex Sans'`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=cat.color;
      ctx.fillText(cat.label.replace(/ Family$/,'').replace(/ Concepts$/,''),p.x,p.y-4*dpr);
      ctx.font=`300 ${fs*0.7}px 'IBM Plex Sans'`;
      ctx.fillStyle=cat.color+'99';
      ctx.fillText(c.count+' concepts',p.x,p.y+fs*0.7);
    });
    requestAnimationFrame(()=>{ if(energy>0.01||drag||animating) sim(); draw(); });
    return;
  }

  const edges=visE(), nodes=vis();
  const conn=new Set();
  if(selected){
    edges.forEach(e=>{
      if(e.from===selected.id) conn.add(e.to);
      if(e.to===selected.id) conn.add(e.from);
    });
  }

  // edges
  edges.forEach(e=>{
    const a=nmap[e.from],b=nmap[e.to];
    const pa=w2s(a.x,a.y),pb=w2s(b.x,b.y);
    const hi=selected&&(e.from===selected.id||e.to===selected.id);
    const dim=selected&&!hi;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
    if(hi){ ctx.strokeStyle=CATS[selected.cat].color+'88'; ctx.lineWidth=2.5*dpr; }
    else if(dim){ ctx.strokeStyle='rgba(30,30,50,0.25)'; ctx.lineWidth=0.8*dpr; }
    else { ctx.strokeStyle='rgba(50,50,70,0.3)'; ctx.lineWidth=1*dpr; }
    ctx.stroke();

    // arrow
    if(hi || (!selected && zoom > 0.7)){
      const angle=Math.atan2(pb.y-pa.y, pb.x-pa.x);
      const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
      const sz=6*dpr;
      ctx.beginPath();
      ctx.moveTo(mx+Math.cos(angle)*sz, my+Math.sin(angle)*sz);
      ctx.lineTo(mx+Math.cos(angle+2.5)*sz*0.6, my+Math.sin(angle+2.5)*sz*0.6);
      ctx.lineTo(mx+Math.cos(angle-2.5)*sz*0.6, my+Math.sin(angle-2.5)*sz*0.6);
      ctx.closePath();
      ctx.fillStyle=hi?CATS[selected.cat].color+'88':'rgba(50,50,70,0.3)';
      ctx.fill();
    }

    // edge label
    if(hi && zoom>0.5){
      const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
      ctx.font=`500 ${9*dpr}px 'IBM Plex Sans'`;
      const met=ctx.measureText(e.label);
      const pad=3*dpr;
      ctx.fillStyle='#08080cdd';
      ctx.fillRect(mx-met.width/2-pad, my-6*dpr-pad, met.width+pad*2, 12*dpr+pad*2);
      ctx.fillStyle=CATS[selected.cat].color+'cc';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.label, mx, my);
    }
  });

  // nodes
  nodes.forEach(n=>{
    const p=w2s(n.x,n.y);
    const cat=CATS[n.cat];
    const isSel=selected&&selected.id===n.id;
    const isConn=conn.has(n.id);
    const isDim=selected&&!isSel&&!isConn;
    const isHov=hovered&&hovered.id===n.id;
    const r=(isSel?28:isHov?26:22)*zoom*dpr;

    if(isSel||isHov){
      const g=ctx.createRadialGradient(p.x,p.y,r*0.4,p.x,p.y,r*3);
      g.addColorStop(0,cat.color+'28');
      g.addColorStop(1,cat.color+'00');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    if(isDim){ ctx.fillStyle='#0e0e16'; ctx.strokeStyle='#1e1e2e'; }
    else { ctx.fillStyle=isSel?cat.color+'20':'#101018'; ctx.strokeStyle=isSel?cat.color:isConn?cat.color+'88':cat.color+'44'; }
    ctx.lineWidth=(isSel?2.5:1.5)*dpr;
    ctx.fill(); ctx.stroke();

    if(!isDim){
      ctx.beginPath(); ctx.arc(p.x,p.y,3*dpr*zoom,0,Math.PI*2);
      ctx.fillStyle=isSel?cat.color:cat.color+'77';
      ctx.fill();
    }

    if(zoom>0.35||isSel||isHov){
      const fs=Math.max(9,11*zoom)*dpr;
      ctx.font=`500 ${fs}px 'IBM Plex Sans'`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillStyle=isDim?'#252535':isSel?'#fff':'#b0b0c0';
      ctx.fillText(n.label, p.x, p.y+r+5*dpr);
    }
  });

  requestAnimationFrame(()=>{ if(energy>0.01||drag||animating) sim(); draw(); });
}

// ================================================================
//  INTERACTION
// ================================================================
function clusterAt(sx,sy){
  if(zoom>=CLUSTER_ZOOM) return null;
  const w=s2w(sx,sy);
  const clusters=getClusters();
  for(const c of clusters){
    const dx=c.x-w.x, dy=c.y-w.y;
    const r=45+c.count*2.5;
    if(Math.sqrt(dx*dx+dy*dy)<r) return c;
  }
  return null;
}

function nodeAt(sx,sy){
  const w=s2w(sx,sy);
  const nodes=vis();
  let best=null,bd=Infinity;
  nodes.forEach(n=>{
    const dx=n.x-w.x, dy=n.y-w.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<35&&d<bd){best=n;bd=d;}
  });
  return best;
}

canvas.addEventListener('mousedown',e=>{
  const cl=clusterAt(e.offsetX,e.offsetY);
  if(cl){ zoomToCluster(cl.cat); return; }
  const n=nodeAt(e.offsetX,e.offsetY);
  if(n){ drag=n; const w=s2w(e.offsetX,e.offsetY); dragOX=n.x-w.x; dragOY=n.y-w.y; selectNode(n); }
  else { pan=true; panSX=e.offsetX; panSY=e.offsetY; panSPX=panX; panSPY=panY; }
});
canvas.addEventListener('mousemove',e=>{
  if(drag){ const w=s2w(e.offsetX,e.offsetY); drag.x=w.x+dragOX; drag.y=w.y+dragOY; drag.vx=0;drag.vy=0; energy=1; }
  else if(pan){ panX=panSPX+(e.offsetX-panSX); panY=panSPY+(e.offsetY-panSY); }
  else { const cl=clusterAt(e.offsetX,e.offsetY); const n=cl?null:nodeAt(e.offsetX,e.offsetY); hovered=n; canvas.style.cursor=(n||cl)?'pointer':'grab'; }
});
canvas.addEventListener('mouseup',()=>{drag=null;pan=false;});
canvas.addEventListener('mouseleave',()=>{drag=null;pan=false;hovered=null;});
canvas.addEventListener('dblclick',e=>{
  const n=nodeAt(e.offsetX,e.offsetY);
  if(n) focusOnNode(n);
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY>0?0.9:1.1;
  const nz=Math.max(0.15,Math.min(3,zoom*factor));
  const cx=e.offsetX-W/2, cy=e.offsetY-H/2;
  panX=cx-(cx-panX)*(nz/zoom);
  panY=cy-(cy-panY)*(nz/zoom);
  zoom=nz;
},{passive:false});

// Touch
let lastTD=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const t=e.touches[0],r=canvas.getBoundingClientRect();
    const ox=t.clientX-r.left,oy=t.clientY-r.top;
    const cl=clusterAt(ox,oy);
    if(cl){zoomToCluster(cl.cat);return;}
    const n=nodeAt(ox,oy);
    if(n){drag=n;const w=s2w(ox,oy);dragOX=n.x-w.x;dragOY=n.y-w.y;selectNode(n);}
    else{pan=true;panSX=ox;panSY=oy;panSPX=panX;panSPY=panY;}
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTD=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0],r=canvas.getBoundingClientRect();
    const ox=t.clientX-r.left,oy=t.clientY-r.top;
    if(drag){const w=s2w(ox,oy);drag.x=w.x+dragOX;drag.y=w.y+dragOY;drag.vx=0;drag.vy=0;energy=1;}
    else if(pan){panX=panSPX+(ox-panSX);panY=panSPY+(oy-panSY);}
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(lastTD){
      const nz=Math.max(0.15,Math.min(3,zoom*(d/lastTD)));
      const r=canvas.getBoundingClientRect();
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left-W/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top-H/2;
      panX=cx-(cx-panX)*(nz/zoom);
      panY=cy-(cy-panY)*(nz/zoom);
      zoom=nz;
    }
    lastTD=d;
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{drag=null;pan=false;lastTD=0;});

document.getElementById('zi').addEventListener('click',()=>{zoom=Math.min(3,zoom*1.3);});
document.getElementById('zo').addEventListener('click',()=>{zoom=Math.max(0.15,zoom*0.7);});
document.getElementById('zf').addEventListener('click',()=>zoomToFit());

// ================================================================
//  DETAIL PANEL
// ================================================================
function selectNode(node){
  selected=node;
  const panel=document.getElementById('detail');
  if(!node){
    panel.innerHTML='<div class="detail-empty"><div class="big">◉</div><p>Click any concept to see what it means, where it came from, and how to explain it to someone else.</p></div>';
    return;
  }
  const cat=CATS[node.cat];
  const conns=EDGES.filter(e=>e.from===node.id||e.to===node.id).map(e=>{
    const oid=e.from===node.id?e.to:e.from;
    const o=nmap[oid];
    if(!o)return null;
    const dir=e.from===node.id?'→':'←';
    return {label:o.label,id:oid,edge:e.label,dir};
  }).filter(Boolean);

  panel.innerHTML=`<div class="dc">
    <div class="dc-cat" style="color:${cat.color}">${cat.label}</div>
    <div class="dc-title">${node.label}</div>
    <div class="dc-bloodline">${node.bloodline}</div>
    <div class="dc-plain">${node.plain}</div>

    <div class="dc-label">Formula</div>
    <div class="dc-formula">${node.formula.replace(/\n/g,'<br>')}</div>

    <div class="dc-label">Example</div>
    <div class="dc-example">${node.example}</div>

    <div class="dc-label">Connections</div>
    <div class="conn-list">
      ${conns.map(c=>`<span class="conn-chip" data-id="${c.id}" title="${c.dir} ${c.edge}">${c.dir} ${c.label}<span style="opacity:0.5;margin-left:4px;font-weight:300">${c.edge}</span></span>`).join('')}
    </div>
    <button class="focus-btn" id="focusBtn">Focus neighborhood</button>

    <div class="teach-box">
      <h4>How to teach this</h4>
      <p>${node.teach}</p>
    </div>
  </div>`;

  panel.querySelectorAll('.conn-chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      const t=nmap[ch.dataset.id];
      if(t){selectNode(t); animateTo(zoom,-t.x*zoom,-t.y*zoom,300);}
    });
  });
  document.getElementById('focusBtn').addEventListener('click',()=>focusOnNode(node));

  panel.scrollTop=0;
}

// ================================================================
//  FILTERS, SEARCH, LEGEND
// ================================================================
const filtersEl=document.getElementById('filters');
Object.entries(CATS).forEach(([k,cat])=>{
  const b=document.createElement('button');
  b.className='fbtn on'; b.dataset.c=k; b.textContent=cat.label;
  b.addEventListener('click',()=>{
    if(activeFilters.has(k)){activeFilters.delete(k);b.classList.remove('on');}
    else{activeFilters.add(k);b.classList.add('on');}
    if(selected&&!activeFilters.has(selected.cat)) selectNode(null);
    energy=1;
  });
  filtersEl.appendChild(b);
});

document.getElementById('search').addEventListener('input',e=>{
  searchTerm=e.target.value.toLowerCase().trim();
  if(selected&&!vis().find(n=>n.id===selected.id)) selectNode(null);
  energy=1;
});

const legEl=document.getElementById('legend');
legEl.innerHTML=Object.entries(CATS).map(([k,c])=>`<div class="legend-row"><div class="legend-dot" style="background:${c.color}"></div>${c.label}</div>`).join('');

// ================================================================
//  INIT
// ================================================================
resize();
window.addEventListener('resize',resize);
initPositions();
for(let i=0;i<500;i++) sim();
// Initial zoom to fit all nodes
(function(){
  const ns=vis(); if(!ns.length) return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  ns.forEach(n=>{ if(n.x<x0)x0=n.x; if(n.x>x1)x1=n.x; if(n.y<y0)y0=n.y; if(n.y>y1)y1=n.y; });
  const sx=(x1-x0)||1, sy=(y1-y0)||1;
  zoom=Math.max(0.15,Math.min(3,Math.min(W/(sx+160),H/(sy+160))));
  panX=-(x0+x1)/2*zoom; panY=-(y0+y1)/2*zoom;
})();
draw();
</script>
